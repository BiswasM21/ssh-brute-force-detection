[SSH Brute Force Alert]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | stats count as failed_count by src_ip
    | where failed_count >= 5
    | sort - failed_count
    | head 10
    | iplocation src_ip
alert.track = 1
alert.expires = 2h
alert.suppress = 1
alert.suppress.fields = src_ip
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */1 * * * *
action.email = 1
action.email.to = security@example.com
action.email.subject = [CRITICAL] SSH Brute Force Detected from $src_ip$
action.email.message = SSH brute force attack detected.\n\nAttacker IP: $src_ip$\nFailed Attempts: $failed_count$\nCountry: $src_ip.Country$\n\nView details: https://splunk.example.com/en-GB/app/ssh_detector/attack_analysis
action.slack = 1
action.script = 1
action.script.filename = alert_ssh_bruteforce.sh

[SSH Critical Brute Force]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | stats count as failed_count by src_ip
    | where failed_count >= 20
    | sort - failed_count
alert.track = 1
alert.expires = 1h
dispatch.earliest_time = -5m
dispatch.latest_time = now
cron_schedule = */1 * * * *
action.email = 1
action.email.to = security@example.com
action.email.subject = [CRITICAL] SSH Brute Force CRITICAL from $src_ip$
action.email.message = CRITICAL: Massive SSH brute force attack detected.\n\nAttacker IP: $src_ip$\nFailed Attempts: $failed_count$
action.pagerduty = 1
action.script = 1
action.script.filename = alert_ssh_critical.sh

[SSH Successful Break-in]
search = index=ssh_security sourcetype=sshd_auth
    | search action=success OR action=failed
    | sort 0 _time
    | streamstats window=20 current=f latest(action) as last_action,
        values(action) as actions, count as attempt_count by src_ip, user
    | search last_action=success AND attempt_count > 5
    | table _time src_ip user attempt_count actions
alert.track = 1
alert.expires = 24h
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
action.email = 1
action.email.to = security@example.com
action.email.subject = [CRITICAL] SSH Successful Login After Brute Force
action.email.message = Possible successful SSH break-in detected.\n\nAttacker IP: $src_ip$\nUser: $user$\nAttempts before success: $attempt_count$
action.slack = 1
action.script = 1
action.script.filename = alert_ssh_breakin.sh

[SSH Credential Stuffing]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | stats count as attempt_count, values(user) as attempted_users by src_ip
    | where attempt_count >= 10 AND mvcount(attempted_users) >= 3
alert.track = 1
alert.expires = 6h
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */10 * * * *
action.email = 1
action.slack = 1

[SSH Slow Brute Force]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | timechart span=1m count by src_ip
    | where count >= 2 AND count <= 3
    | foreach * [eval <<FIELD>>=if('<<FIELD>>' >= 2, 1, 0)]
    | addinfo
    | eval window_minutes=round((info_max_time - info_min_time) / 60, 0)
    | where window_minutes >= 10
alert.track = 1
alert.expires = 12h
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */15 * * * *

[SSH Password Spray Detection]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | stats dc(user) as unique_users by src_ip
    | where unique_users >= 5
alert.track = 1
alert.expires = 6h
dispatch.earliest_time = -1h
dispatch.latest_time = now
cron_schedule = */15 * * * *
action.email = 1
action.email.subject = [HIGH] SSH Password Spray Detected
action.slack = 1

[SSH Port Scan Preceding Attack]
search = index=main sourcetype=network_scan src_port=22 OR dest_port=22
    | rex field=src_ip "(?<src_ip>\d+\.\d+\.\d+\.\d+)"
    | stats count as scan_count by src_ip
    | where scan_count >= 3
    | join src_ip [search index=ssh_security sourcetype=sshd_auth action=failed
        | stats count as brute_count by src_ip
        | where brute_count >= 5]
alert.track = 1
alert.expires = 12h
dispatch.earliest_time = -2h
dispatch.latest_time = now
cron_schedule = */30 * * * *

[SSH Geolocation Report]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | iplocation src_ip
    | stats count as attempts by Country
    | sort - attempts
    | head 20
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 0 * * *
action.email = 1
action.email.to = security@example.com
action.email.subject = Daily SSH Attack Geolocation Report
action.email.format = html
action.email.inline = 1

[SSH Top Attackers]
search = index=ssh_security sourcetype=sshd_auth action=failed
    | stats count as attempts, values(user) as targets by src_ip
    | sort - attempts
    | head 20
    | iplocation src_ip
    | table src_ip Country attempts targets
dispatch.earliest_time = -24h
dispatch.latest_time = now
cron_schedule = 0 6 * * *
action.email = 1
action.email.to = security@example.com
action.email.subject = Daily SSH Top Attackers Report
action.email.inline = 1
