[ssh_auth_events]
definition = index=ssh_security sourcetype=sshd_auth
description = Base search for SSH authentication events

[ssh_failed_logins]
definition = index=ssh_security sourcetype=sshd_auth action=failed
description = Failed SSH login attempts

[ssh_successful_logins]
definition = index=ssh_security sourcetype=sshd_auth action=success
description = Successful SSH login attempts

[ssh_brute_force_threshold]
definition = index=ssh_security sourcetype=sshd_auth action=failed
    | stats count as attempts by src_ip
    | where attempts >= 5
description = Detect brute force attempts (>5 failures)

[ssh_geolocation]
definition = | iplocation src_ip
description = Add geolocation data to SSH events

[ssh_common_usernames]
definition = root, admin, user, test, guest, oracle, postgres, mysql, ubuntu, centos
description = Common SSH usernames to check

[ssh_invalid_users]
definition = index=ssh_security (user="Invalid user" OR user="user not found" OR user="Failed")
description = Invalid user enumeration attempts

[ssh_login_rate]
definition = index=ssh_security sourcetype=sshd_auth
    | timechart span=1m count by action
description = Login rate over time

[ssh_top_attackers]
definition = index=ssh_security sourcetype=sshd_auth action=failed
    | stats count as attempts by src_ip
    | sort - attempts
    | head 10
    | iplocation src_ip
description = Top attacking IPs with geolocation

[ssh_attack_timeline]
definition = index=ssh_security sourcetype=sshd_auth
    | timechart span=5m count by action usenull=f
description = Attack timeline visualization

[ssh_country_stats]
definition = index=ssh_security sourcetype=sshd_auth action=failed
    | iplocation src_ip
    | stats count by Country
    | sort - count
    | head 20
description = Attack statistics by country
