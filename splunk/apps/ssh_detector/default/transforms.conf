[set_sourcetype_auth]
REGEX = .
FORMAT = sourcetype::sshd_auth
DEST_KEY = MetaData:Sourcetype

[set_sourcetype_secure]
REGEX = .
FORMAT = sourcetype::sshd_secure
DEST_KEY = MetaData:Sourcetype

[ssh_auth_lookup]
filename = ssh_auth_types.csv
match_type = CIDR

[ssh_country_codes]
filename = country_codes.csv

[ssh_threat_intel]
filename = threat_intel_ips.csv
fields_list = ip, threat_type, confidence, last_seen

[ssh_blacklist]
filename = blacklist_ips.csv
fields_list = ip, reason, added_date, expires

[ssh_whitelist]
filename = whitelist_ips.csv
fields_list = ip, reason, added_by

[extract_ssh_fields]
REGEX = Failed password for (?:invalid user )?(?<user>\S+) from (?<src_ip>\d+\.\d+\.\d+\.\d+) port (?<src_port>\d+)
FORMAT = user::$1 src_ip::$2 src_port::$3
DEST_KEY = _raw

[extract_ssh_success]
REGEX = Accepted (?<auth_method>\w+) for (?<user>\S+) from (?<src_ip>\d+\.\d+\.\d+\.\d+) port (?<src_port>\d+)
FORMAT = user::$1 auth_method::$2 src_ip::$3 src_port::$4
DEST_KEY = _raw

[extract_invalid_user]
REGEX = Invalid user (?<user>\S+) from (?<src_ip>\d+\.\d+\.\d+\.\d+)
FORMAT = user::$1 src_ip::$2
DEST_KEY = _raw

[normalize_ssh_action]
REGEX = (?:Accepted|Failed|Permission denied)
FORMAT = normalized_action::$1
DEST_KEY = _raw
