# yamllint configuration - basic checks only
extends:
  default

rules:
  # Disable document markers (optional in YAML)
  document-start: disable
  document-end: disable
  # Warnings for formatting issues
  line-length:
    level: warning
    max: 200
  trailing-spaces: disable
  # Disable strict truthy check for GitHub Actions
  truthy: disable
  # Disable bracket spacing warnings
  brackets: disable
  # Disable colons spacing warnings
  colons: disable
  # Disable commas spacing warnings
  commas: disable
