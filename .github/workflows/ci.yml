name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 yamllint black

      - name: Lint Python files
        run: |
          flake8 tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yaml .

      - name: Check code formatting
        run: |
          black --check tests/ || true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests colorama tabulate

      - name: Run tests
        run: |
          python tests/test_detection.py || true
        continue-on-error: true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          cd docker
          docker-compose build

      - name: Run Docker Compose
        run: |
          cd docker
          docker-compose up -d
          sleep 30
          docker-compose ps

      - name: Test Splunk availability
        run: |
          sleep 10
          curl -sk https://localhost:8000 | grep -q "Splunk" || echo "Splunk not ready"

      - name: Cleanup
        if: always()
        run: |
          cd docker
          docker-compose down -v

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  vagrant-validate:
    name: Vagrant Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vagrant
        run: |
          sudo apt-get update
          sudo apt-get install -y vagrant ruby

      - name: Validate Vagrantfile
        run: |
          cd vagrant
          vagrant validate || echo "Vagrant validation skipped"

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation files exist
        run: |
          test -f docs/architecture.md || exit 1
          test -f docs/setup-guide.md || exit 1
          test -f docs/user-guide.md || exit 1

      - name: Check README
        run: |
          test -f README.md || exit 1
          grep -q "SSH Brute Force Detection" README.md || exit 1
